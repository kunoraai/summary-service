name: release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/kunoraai/summary-service:${{ github.sha }}
      - name: Make container package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh api --method PATCH
          /orgs/kunoraai/packages/container/summary-service
          -f visibility=public
      - uses: actions/checkout@v4
        with:
          repository: kunoraai/platform-config
          token: ${{ secrets.PLATFORM_CONFIG_TOKEN }}
          path: platform-config
      - name: Update production image digest
        uses: mikefarah/yq@v4.47.2
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        with:
          cmd: >-
            yq -i '.images[0] = {"name":"ghcr.io/kunoraai/summary-service","newName":"ghcr.io/kunoraai/summary-service","digest":strenv(DIGEST)}'
            platform-config/clusters/ecs1/apps/summary-service/kustomization.yaml
      - name: Commit production release
        working-directory: platform-config
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          git config user.name "kunoraai-release-bot"
          git config user.email "platform@whale-smart.com"
          git add clusters/ecs1/apps/summary-service/kustomization.yaml
          git commit -m "deploy(summary-service): ${GITHUB_SHA}" || exit 0
          git push origin main
